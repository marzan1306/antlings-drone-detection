# YOLOv8 Training Configuration
# Tuned for VisDrone small-object aerial imagery

model: yolov8n.pt             # Pretrained backbone (nano for speed; use yolov8s.pt for better accuracy)
data: configs/data.yaml

# Core training
epochs: 50
batch: 16                     # Reduce to 8 if GPU VRAM < 8GB
imgsz: 640                    # Input resolution; 1280 gives ~+3% mAP but 4x slower
workers: 8
device: 0                     # GPU index; use 'cpu' if no GPU

# Optimizer
optimizer: AdamW
lr0: 0.001                    # Initial learning rate
lrf: 0.01                     # Final LR = lr0 * lrf
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3
warmup_momentum: 0.8

# Loss weights
box: 7.5                      # Box regression loss weight
cls: 0.5                      # Classification loss weight
dfl: 1.5                      # DFL loss weight

# Augmentation — critical for aerial imagery
hsv_h: 0.015                  # Hue augmentation
hsv_s: 0.7                    # Saturation augmentation
hsv_v: 0.4                    # Value/brightness augmentation
degrees: 10.0                 # Rotation (drones tilt)
translate: 0.1
scale: 0.5                    # Scale jitter — simulates altitude changes
shear: 2.0
perspective: 0.0001
flipud: 0.3                   # Vertical flip (drone views vary)
fliplr: 0.5
mosaic: 1.0                   # Mosaic augmentation — key for dense scenes
mixup: 0.15                   # MixUp augmentation
copy_paste: 0.1               # Copy-paste for small objects

# Thresholds
conf: 0.35                    # Confidence threshold (lower = catch more small objects)
iou: 0.45                     # NMS IoU threshold

# Output
project: runs/detect
name: visdrone_yolov8n
save: true
save_period: 10               # Save checkpoint every N epochs
plots: true                   # Generate training plots
